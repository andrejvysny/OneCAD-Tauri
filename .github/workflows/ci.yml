name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: rust
    runs-on: macos-14
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install rustfmt + clippy
        run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # Build AND STAGE the C++ sidecar first: `bundle.externalBin` makes Tauri's
      # build script require src-tauri/binaries/onecad-worker-<triple> to exist,
      # and clippy/test both compile the app crate (and thus its build script) —
      # so staging must precede every cargo invocation that touches the app crate.
      # The script configures, builds, and stages under the rustc host triple.
      # The real-worker / m2 gates also need the binary (ONECAD_REQUIRE_WORKER).
      - name: Install OCCT toolchain
        working-directory: .
        run: brew install opencascade boost eigen nlohmann-json || true
      - name: Build + stage worker
        working-directory: .
        run: scripts/build-worker.sh Release
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        env:
          ONECAD_WORKER_PATH: ${{ github.workspace }}/worker/build/onecad-worker
          # Hard-fail (not a green skip) if the worker build step regressed and no
          # binary resolves — the worker-backed gates (m2/wire_contract/topology_rebind)
          # must actually run in CI (M4a MINOR-2).
          ONECAD_REQUIRE_WORKER: "1"
        run: cargo test --workspace

  worker:
    name: worker
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      # These steps are skipped until worker/CMakeLists.txt exists (evaluated
      # after checkout so hashFiles can see the tree). Once the worker lands they
      # run for real — no continue-on-error.
      - name: Install OCCT toolchain
        if: hashFiles('worker/CMakeLists.txt') != ''
        run: brew install opencascade boost eigen nlohmann-json || true
      - name: Configure
        if: hashFiles('worker/CMakeLists.txt') != ''
        run: cmake -S worker -B worker/build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        if: hashFiles('worker/CMakeLists.txt') != ''
        run: cmake --build worker/build --parallel
      - name: Test
        if: hashFiles('worker/CMakeLists.txt') != ''
        run: ctest --test-dir worker/build --output-on-failure

  frontend:
    name: frontend
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install
        run: bun install --frozen-lockfile || bun install
      - name: Build
        run: bun run build
      - name: Test
        # Guarded on a "test" script actually existing in package.json.
        run: |
          if grep -q '"test"' package.json; then
            bun run test
          else
            echo "no test script in package.json — skipping"
          fi
